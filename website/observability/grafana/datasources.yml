apiVersion: 1

datasources:
  # Tempo - Trazas
  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    uid: tempo
    isDefault: false
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags:
          - key: "service.name"
            value: "service"
        filterByTraceID: true
        filterBySpanID: false
        customQuery: false
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags:
          - key: "service.name"
            value: "job"
        queries:
          - name: "Request Rate"
            query: "sum by (job) (rate(http_requests_total{$$__tags}[5m]))"
          - name: "Error Rate"
            query: "sum by (job) (rate(http_requests_total{$$__tags, status_code=~\"5..\"}[5m]))"
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

  # Loki - Logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    uid: loki
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: "traceId\":\"([a-f0-9]+)\""
          name: TraceID
          url: "$${__value.raw}"
          urlDisplayLabel: "Ver en Tempo"
        - datasourceUid: tempo
          matcherRegex: '"traceId"\s*:\s*"([a-f0-9]{32})"'
          name: TraceID_json
          url: "$${__value.raw}"
          urlDisplayLabel: "Abrir traza"

  # Prometheus - Métricas
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    uid: prometheus
    isDefault: true
    editable: true
