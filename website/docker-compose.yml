version: "3.8"

services:
  # ==================== BASES DE DATOS ====================

  postgres:
    image: postgres:15-alpine
    container_name: users-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usersdb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ecommerce-tshirts/infrastructure/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability
    restart: unless-stopped

  products-db:
    image: postgres:15-alpine
    container_name: products-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: productsdb
    ports:
      - "5435:5432"
    volumes:
      - products_db_data:/var/lib/postgresql/data
      - ./ecommerce-tshirts/infrastructure/database/products-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability
    restart: unless-stopped

  cart-db:
    image: postgres:15-alpine
    container_name: cart-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cartdb
    ports:
      - "5436:5432"
    volumes:
      - cart_db_data:/var/lib/postgresql/data
      - ./ecommerce-tshirts/infrastructure/database/cart-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability
    restart: unless-stopped

  orders-db:
    image: postgres:15-alpine
    container_name: orders-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordersdb
    ports:
      - "5437:5432"
    volumes:
      - orders_db_data:/var/lib/postgresql/data
      - ./ecommerce-tshirts/infrastructure/database/orders-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability
    restart: unless-stopped

  payments-db:
    image: postgres:15-alpine
    container_name: payments-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paymentsdb
    ports:
      - "5438:5432"
    volumes:
      - payments_db_data:/var/lib/postgresql/data
      - ./ecommerce-tshirts/infrastructure/database/payments-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability
    restart: unless-stopped

  # ==================== OBSERVABILIDAD - GRAFANA STACK ====================

  # Tempo - Almacenamiento de trazas
  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    user: root
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   # Tempo API
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - observability
    restart: unless-stopped

  # Loki - Almacenamiento de logs
  loki:
    image: grafana/loki:latest
    container_name: loki
    command: [ "-config.file=/etc/loki/local-config.yaml" ]
    volumes:
      - ./observability/loki/loki.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    restart: unless-stopped

  # Promtail - Recolector de logs
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    command: [ "-config.file=/etc/promtail/promtail.yaml" ]
    volumes:
      - ./observability/promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - observability
    depends_on:
      - loki
    restart: unless-stopped

  # Prometheus - Métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-remote-write-receiver'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./observability/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml
      - ./observability/prometheus/slo-rules.yml:/etc/prometheus/slo-rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    depends_on:
      - api
      - products-service
      - cart-service
      - orders-service
      - payments-service
    restart: unless-stopped

  # Grafana - Interfaz de visualización
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - observability
    depends_on:
      - tempo
      - loki
      - prometheus
    restart: unless-stopped

  # ==================== MICROSERVICIOS E-COMMERCE ====================

  api:
    build: ./ecommerce-tshirts/services/users-service
    container_name: users-api
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: usersdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ecommerce-jwt-secret-2026
      # OpenTelemetry configuration
      OTEL_SERVICE_NAME: users-api-microservice
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      TRACE_SAMPLING_RATE: "1.0"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - observability
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  products-service:
    build: ./ecommerce-tshirts/services/products-service
    container_name: products-service
    environment:
      PORT: 3002
      DB_HOST: products-db
      DB_PORT: 5432
      DB_NAME: productsdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ecommerce-jwt-secret-2026
      OTEL_SERVICE_NAME: products-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      TRACE_SAMPLING_RATE: "1.0"
    ports:
      - "3002:3002"
    depends_on:
      products-db:
        condition: service_healthy
      tempo:
        condition: service_started
    networks:
      - observability
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cart-service:
    build: ./ecommerce-tshirts/services/cart-service
    container_name: cart-service
    environment:
      PORT: 3003
      DB_HOST: cart-db
      DB_PORT: 5432
      DB_NAME: cartdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ecommerce-jwt-secret-2026
      PRODUCTS_SERVICE_URL: http://products-service:3002
      OTEL_SERVICE_NAME: cart-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      TRACE_SAMPLING_RATE: "1.0"
    ports:
      - "3003:3003"
    depends_on:
      cart-db:
        condition: service_healthy
      products-service:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - observability
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  orders-service:
    build: ./ecommerce-tshirts/services/orders-service
    container_name: orders-service
    environment:
      PORT: 3004
      DB_HOST: orders-db
      DB_PORT: 5432
      DB_NAME: ordersdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ecommerce-jwt-secret-2026
      CART_SERVICE_URL: http://cart-service:3003
      PRODUCTS_SERVICE_URL: http://products-service:3002
      OTEL_SERVICE_NAME: orders-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      TRACE_SAMPLING_RATE: "1.0"
    ports:
      - "3004:3004"
    depends_on:
      orders-db:
        condition: service_healthy
      cart-service:
        condition: service_started
      products-service:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - observability
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  payments-service:
    build: ./ecommerce-tshirts/services/payments-service
    container_name: payments-service
    environment:
      PORT: 3005
      DB_HOST: payments-db
      DB_PORT: 5432
      DB_NAME: paymentsdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ecommerce-jwt-secret-2026
      ORDERS_SERVICE_URL: http://orders-service:3004
      OTEL_SERVICE_NAME: payments-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      TRACE_SAMPLING_RATE: "1.0"
    ports:
      - "3005:3005"
    depends_on:
      payments-db:
        condition: service_healthy
      orders-service:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - observability
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend - Interfaz web interactiva
  frontend:
    build: ./ecommerce-tshirts/frontend
    container_name: users-front
    ports:
      - "4000:80"
    depends_on:
      - api
      - products-service
      - cart-service
      - orders-service
      - payments-service
    networks:
      - observability
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  products_db_data:
  cart_db_data:
  orders_db_data:
  payments_db_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:

networks:
  observability:
    driver: bridge
